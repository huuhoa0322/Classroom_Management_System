# =============================================================================
# CLS Backend — CI/CD Pipeline
# =============================================================================
# Trigger: Push/PR to main or develop
# Stages: Build → Test → Docker Build & Push → Deploy
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME    — Docker Hub username
#   DOCKERHUB_TOKEN       — Docker Hub access token
#   DATABASE_URL          — Supabase connection string (for integration tests)
#   JWT_SECRET_KEY        — JWT signing key (production)
#   DEPLOY_HOST           — VPS IP address (for deployment)
#   DEPLOY_USER           — SSH username on VPS
#   DEPLOY_SSH_KEY        — SSH private key for VPS access
# =============================================================================

name: CLS Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      # Only trigger when backend code changes
      - "Developments/CLS/CLS.Server/**"
      - "Developments/CLS/CLS.BLL/**"
      - "Developments/CLS/CLS.DAL/**"
      - "Developments/CLS/Dockerfile"
      - "Developments/CLS/docker-compose.yml"
      - ".github/workflows/cls-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "Developments/CLS/CLS.Server/**"
      - "Developments/CLS/CLS.BLL/**"
      - "Developments/CLS/CLS.DAL/**"

# Cancel previous runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cls-backend
  WORKING_DIR: Developments/CLS

# =============================================================================
# JOBS
# =============================================================================
jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Test
  # ───────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore NuGet packages
        working-directory: ${{ env.WORKING_DIR }}
        run: dotnet restore CLS.Server/CLS.Server.csproj

      - name: 🔨 Build (Release)
        working-directory: ${{ env.WORKING_DIR }}
        run: dotnet build CLS.Server/CLS.Server.csproj --configuration Release --no-restore

      # ── Unit Tests (khi có test project) ──────────────────────────────────
      # Uncomment khi thêm CLS.Tests project:
      # - name: 🧪 Run unit tests
      #   working-directory: ${{ env.WORKING_DIR }}
      #   run: |
      #     dotnet test CLS.Tests/CLS.Tests.csproj \
      #       --configuration Release \
      #       --no-build \
      #       --verbosity normal \
      #       --logger "trx;LogFileName=test-results.trx" \
      #       --collect:"XPlat Code Coverage"

      # - name: 📊 Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-results
      #     path: ${{ env.WORKING_DIR }}/**/TestResults/

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Docker Build & Push (only on main/develop push, not PRs)
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏷️ Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            # Tag "latest" for main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag "staging" for develop branch
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}
            # Tag with short SHA for traceability
            type=sha,prefix=,format=short

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Staging (develop branch)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: http://${{ secrets.DEPLOY_HOST }}:8080/health

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Pull latest staging image
            docker pull ${{ env.DOCKER_IMAGE }}:staging

            # Stop and remove existing container (if running)
            docker stop cls-api-staging 2>/dev/null || true
            docker rm cls-api-staging 2>/dev/null || true

            # Run new container
            docker run -d \
              --name cls-api-staging \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ConnectionStrings__DefaultConnection="${{ secrets.DATABASE_URL }}" \
              -e JwtSettings__SecretKey="${{ secrets.JWT_SECRET_KEY }}" \
              -e JwtSettings__Issuer="cls-api" \
              -e JwtSettings__Audience="cls-client" \
              -e AllowedOrigins="${{ secrets.ALLOWED_ORIGINS }}" \
              -e ASPNETCORE_ENVIRONMENT="Staging" \
              ${{ env.DOCKER_IMAGE }}:staging

            # Wait for container to be healthy
            echo "Waiting for health check..."
            sleep 10
            curl -f http://localhost:8080/health || exit 1
            echo "✅ Staging deployment successful!"

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy to Production (main branch — manual approval)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://${{ secrets.DEPLOY_HOST }}:8080/health

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Pull latest production image
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            # Stop and remove existing container
            docker stop cls-api 2>/dev/null || true
            docker rm cls-api 2>/dev/null || true

            # Run new container
            docker run -d \
              --name cls-api \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ConnectionStrings__DefaultConnection="${{ secrets.DATABASE_URL }}" \
              -e JwtSettings__SecretKey="${{ secrets.JWT_SECRET_KEY }}" \
              -e JwtSettings__Issuer="cls-api" \
              -e JwtSettings__Audience="cls-client" \
              -e AllowedOrigins="${{ secrets.ALLOWED_ORIGINS }}" \
              -e ASPNETCORE_ENVIRONMENT="Production" \
              ${{ env.DOCKER_IMAGE }}:latest

            # Wait for container to be healthy
            echo "Waiting for health check..."
            sleep 10
            curl -f http://localhost:8080/health || exit 1
            echo "✅ Production deployment successful!"
