# =============================================================================
# CLS Backend — CI Pipeline (Build & Test)
# =============================================================================
# CI: GitHub Actions (Build → Test)
# CD: Render.com auto-deploys from main/develop branch
#
# Render.com handles:
#   - Docker image build (from Dockerfile)
#   - Deployment & hosting
#   - Health check monitoring
#   - SSL/TLS certificates
# =============================================================================

name: CLS Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      # Only trigger when backend code changes
      - "Developments/CLS/CLS.Server/**"
      - "Developments/CLS/CLS.BLL/**"
      - "Developments/CLS/CLS.DAL/**"
      - "Developments/CLS/Dockerfile"
      - ".github/workflows/cls-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "Developments/CLS/CLS.Server/**"
      - "Developments/CLS/CLS.BLL/**"
      - "Developments/CLS/CLS.DAL/**"

# Cancel previous runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  WORKING_DIR: Developments/CLS

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Test
  # ───────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore NuGet packages
        working-directory: ${{ env.WORKING_DIR }}
        run: dotnet restore CLS.Server/CLS.Server.csproj

      - name: 🔨 Build (Release)
        working-directory: ${{ env.WORKING_DIR }}
        run: dotnet build CLS.Server/CLS.Server.csproj --configuration Release --no-restore

      # ── Unit Tests (uncomment khi có CLS.Tests project) ─────────────────
