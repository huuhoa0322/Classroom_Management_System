<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Timetable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
        <div class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-800">My Timetable</h1>
            <p class="text-sm text-gray-500 mt-1">System UI mapping to UC-07: View Personalized Timetables.</p>
        </div>
        
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-medium text-gray-800">Current Week: Oct 12 - Oct 18, 2026</h3>
            <select class="rounded-md border-gray-300 border p-2 shadow-sm text-sm">
                <option>Daily View</option>
                <option selected>Weekly View</option>
            </select>
        </div>
        <div class="space-y-4">
            <div class="border rounded-md p-4 bg-white hover:bg-gray-50 cursor-pointer shadow-sm border-l-4 border-blue-500">
                <div class="flex justify-between">
                    <div>
                        <h4 class="font-bold text-gray-900">Class: IELTS-2026-A1</h4>
                        <p class="text-sm text-gray-600 mt-1">Room: 304 - Building A</p>
                    </div>
                    <div class="text-right">
                        <span class="block font-bold text-blue-600">18:00 - 20:00</span>
                        <span class="block text-sm text-gray-500 mt-1">Today</span>
                    </div>
                </div>
            </div>
            <div class="border rounded-md p-4 bg-white hover:bg-gray-50 cursor-pointer shadow-sm border-l-4 border-gray-300">
                <div class="flex justify-between">
                    <div>
                        <h4 class="font-bold text-gray-900">Class: Basic-ENG-101</h4>
                        <p class="text-sm text-gray-600 mt-1">Room: 301 - Building A</p>
                    </div>
                    <div class="text-right">
                        <span class="block font-bold text-gray-700">14:00 - 16:00</span>
                        <span class="block text-sm text-gray-500 mt-1">Tomorrow</span>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
</body>
</html>
