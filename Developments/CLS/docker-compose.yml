# =============================================================================
# CLS — Docker Compose
# =============================================================================
# Env vars dùng chung format ASP.NET Core (Section__Key)
# → Cùng tên biến hoạt động cho cả Docker Compose + Render.com
#
# ── Mode 1: Supabase (default) ──────────────────────────────────────────────
#   docker compose up -d cls-api
#
# ── Mode 2: Local DB ────────────────────────────────────────────────────────
#   docker compose --profile local-db up -d
# =============================================================================

services:
  # ── PostgreSQL (chỉ dùng khi cần local DB) ───────────────────────────────
  cls-db:
    image: postgres:16-alpine
    container_name: cls-db
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cls_dev}
      POSTGRES_USER: ${POSTGRES_USER:-cls_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpass123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - cls-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cls_admin} -d ${POSTGRES_DB:-cls_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cls-network

  # ── CLS Backend API ──────────────────────────────────────────────────────
  cls-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cls-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      # Tên biến = format ASP.NET Core → dùng chung với Render
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      JwtSettings__SecretKey: ${JwtSettings__SecretKey:?JwtSettings__SecretKey is required}
      JwtSettings__Issuer: ${JwtSettings__Issuer:-cls-api}
      JwtSettings__Audience: ${JwtSettings__Audience:-cls-client}
      JwtSettings__AccessTokenExpiryMinutes: ${JwtSettings__AccessTokenExpiryMinutes:-60}
      JwtSettings__RefreshTokenExpiryDays: ${JwtSettings__RefreshTokenExpiryDays:-7}
      AllowedOrigins: ${AllowedOrigins:-http://localhost:5173}
    networks:
      - cls-network

volumes:
  cls-pgdata:
    driver: local
    name: cls-pgdata

networks:
  cls-network:
    driver: bridge
    name: cls-network
