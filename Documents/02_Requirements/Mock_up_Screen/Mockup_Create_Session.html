<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Session Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
        <div class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Create Session Schedule</h1>
            <p class="text-sm text-gray-500 mt-1">System UI mapping to UC-04: Setup Core Teaching Schedules.</p>
        </div>
        
        <form class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Class Cohort *</label>
                <select class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm">
                    <option>IELTS-2026-A1</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Assign Teacher *</label>
                    <select class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm">
                        <option>Mr. John Doe (Native)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Assign Room *</label>
                    <select class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm">
                        <option>Room 304 - Building A (Capacity: 20)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Start Time *</label>
                    <input type="datetime-local" class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">End Time *</label>
                    <input type="datetime-local" class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm" />
                </div>
            </div>
            <div class="pt-4 flex justify-end space-x-3">
                <button type="button" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md shadow-sm">Cancel</button>
                <button type="button" class="bg-blue-600 text-white px-4 py-2 rounded-md shadow-sm">Save Session</button>
            </div>
        </form>
        
    </div>
</body>
</html>
