<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolve Scheduling Conflict</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
        <div class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Resolve Scheduling Conflict</h1>
            <p class="text-sm text-gray-500 mt-1">System UI mapping to UC-05: Resolve Scheduling Conflicts.</p>
        </div>
        
        <div class="bg-red-50 border border-red-200 rounded-md p-4 mb-6">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800">Double-Booking Detected</h3>
                    <div class="mt-2 text-sm text-red-700">
                        <p><strong>Room 304</strong> is already booked for Class <em>Basic-ENG-101</em> from 18:00 to 20:00 on selected date.</p>
                    </div>
                </div>
            </div>
        </div>
        <form class="space-y-4">
            <h3 class="font-medium text-gray-900 border-b pb-2">Select Alternative Resource</h3>
            <div>
                <label class="block text-sm font-medium text-gray-700">Alternative Room Selection</label>
                <select class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                    <option value="">-- Choose Available Room --</option>
                    <option>Room 305 - Building A (Available)</option>
                    <option>Room 306 - Building A (Available)</option>
                </select>
            </div>
            <div class="pt-4 flex justify-end space-x-3">
                <button type="button" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md shadow-sm">Discard</button>
                <button type="button" class="bg-blue-600 text-white px-4 py-2 rounded-md shadow-sm">Apply & Save</button>
            </div>
        </form>
        
    </div>
</body>
</html>
