<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Offline Tuition Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
        <div class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Record Offline Tuition Payment</h1>
            <p class="text-sm text-gray-500 mt-1">System UI mapping to UC-03: Record Offline Tuition Payments.</p>
        </div>
        
        <form class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Select Student *</label>
                <select class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm bg-gray-50">
                    <option>ST-2026-001 - Nguyen Van A</option>
                    <option>ST-2026-002 - Tran Thi B</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Target Package</label>
                <input type="text" readonly value="Advanced IELTS 6.5 (60 Sessions)" class="mt-1 block w-full rounded-md border-gray-200 border p-2 bg-gray-100 text-gray-500" />
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Payment Amount (VND) *</label>
                    <input type="number" class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm" placeholder="15,000,000" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Payment Date *</label>
                    <input type="date" class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm" />
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Payment Method *</label>
                <div class="mt-2 space-x-4">
                    <label class="inline-flex items-center"><input type="radio" name="method" class="form-radio" checked> <span class="ml-2">Cash</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="method" class="form-radio"> <span class="ml-2">Bank Transfer</span></label>
                </div>
            </div>
            <div class="pt-4 flex justify-end space-x-3">
                <button type="button" class="bg-green-600 text-white px-4 py-2 rounded-md shadow-sm font-medium">Record Payment</button>
            </div>
        </form>
        
    </div>
</body>
</html>
