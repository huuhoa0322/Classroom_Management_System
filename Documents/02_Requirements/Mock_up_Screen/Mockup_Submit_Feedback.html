<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Academic Performance Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
        <div class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Submit Academic Performance Feedback</h1>
            <p class="text-sm text-gray-500 mt-1">System UI mapping to UC-09: Submit Academic Performance Feedback.</p>
        </div>
        
        <div class="bg-indigo-50 p-4 rounded-md border border-indigo-100 mb-4 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-indigo-900">IELTS-2026-A1 - Student: Nguyen Van A</h3>
                <p class="text-sm text-indigo-700">SLA Timer: <span class="font-bold text-green-600">10 hours remaining</span></p>
            </div>
        </div>
        <form class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Performance Score (1-10) *</label>
                    <input type="number" min="1" max="10" class="mt-1 block text-lg font-bold w-32 rounded-md border-gray-300 border p-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" value="8" />
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Qualitative Feedback Context *</label>
                <textarea rows="4" class="mt-1 block w-full rounded-md border-gray-300 border p-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="Type specific observation and improvement notes here..."></textarea>
            </div>
            <div class="pt-4 flex justify-end space-x-3">
                <button type="button" class="bg-indigo-600 text-white px-6 py-2 rounded-md shadow-sm font-medium">Save & Publish Feedback</button>
            </div>
        </form>
        
    </div>
</body>
</html>
