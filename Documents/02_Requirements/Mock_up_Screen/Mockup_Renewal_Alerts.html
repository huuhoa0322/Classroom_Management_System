<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Renewal Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
        <div class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Package Renewal Alerts</h1>
            <p class="text-sm text-gray-500 mt-1">System UI mapping to UC-06: Review Package Renewal Alerts.</p>
        </div>
        
        <div class="overflow-hidden border border-gray-200 rounded-md">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Student Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Remaining Sessions</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Parent Contact</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Action Status</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Manage</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Nguyen Van A</td>
                        <td class="px-6 py-4 whitespace-nowrap"><span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">2 sessions</span></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">0912345678</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-yellow-600 font-medium">Pending Call</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <a href="#" class="text-blue-600 hover:text-blue-900">Resolve</a>
                        </td>
                    </tr>
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Tran Thi B</td>
                        <td class="px-6 py-4 whitespace-nowrap"><span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">4 sessions</span></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">0987654321</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-green-600 font-medium">Resolved</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <span class="text-gray-400">Done</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
    </div>
</body>
</html>
